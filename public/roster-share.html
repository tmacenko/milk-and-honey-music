<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Milk & Honey Sports — Athlete Roster</title>
  <meta name="robots" content="noindex" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:        #080809;
      --surface:   #111113;
      --raised:    #18181b;
      --border:    #1e1e22;
      --border-l:  #28282d;
      --text:      #f4f4f5;
      --text2:     #71717a;
      --text3:     #3f3f46;
      --green:     #3eaa78;
      --green-s:   rgba(62,170,120,0.09);
      --shadow:    0 1px 2px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.35);
      --shadow-lg: 0 4px 12px rgba(0,0,0,0.7), 0 20px 60px rgba(0,0,0,0.5);
      --ease:      cubic-bezier(0.4,0,0.2,1);
      --ff:        -apple-system,'SF Pro Display','Helvetica Neue',sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--ff); -webkit-font-smoothing: antialiased; }

    /* Header */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(8,8,9,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 28px; height: 56px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { height: 30px; }
    .header-divider { width: 1px; height: 18px; background: var(--border-l); }
    .header-title { font-size: 13px; font-weight: 600; color: var(--text2); }
    .btn-print {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border-l); border-radius: 9px;
      padding: 7px 14px; font-size: 12px; font-weight: 600; color: var(--text2);
      cursor: pointer; font-family: var(--ff); transition: all 0.18s var(--ease);
    }
    .btn-print:hover { color: var(--text); background: var(--raised); }

    /* Tabs */
    .tabs { padding: 20px 28px 0; display: flex; gap: 6px; }
    .tab {
      padding: 7px 16px; border-radius: 8px; border: none;
      font-family: var(--ff); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.18s var(--ease);
      background: transparent; color: var(--text2);
    }
    .tab.active { background: var(--raised); color: var(--text); font-weight: 600; }
    .tab:hover:not(.active) { color: var(--text); }

    /* Grid */
    .grid-wrap { padding: 18px 28px 48px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }

    /* Card */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; overflow: hidden; cursor: pointer;
      transition: all 0.2s var(--ease); box-shadow: var(--shadow); position: relative;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--border-l); background: var(--raised); }
    .card-top { padding: 16px 16px 12px; }
    .card-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: var(--raised); border: 1px solid var(--border);
      overflow: hidden; margin-bottom: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: var(--text2);
    }
    .card-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 2px; }
    .card-pos  { font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 2px; }
    .card-team { font-size: 11px; color: var(--text3); }
    .card-logos {
      display: flex; gap: 6px; padding: 8px 14px; border-top: 1px solid var(--border);
    }
    .card-logo {
      width: 36px; height: 36px; border-radius: 50%; background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(0,0,0,0.35); overflow: hidden; flex-shrink: 0;
    }
    .card-logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-social { display: flex; gap: 12px; padding: 9px 16px; border-top: 1px solid var(--border); }
    .cs { display: flex; align-items: center; gap: 4px; }
    .cs svg { color: var(--text3); flex-shrink: 0; }
    .cs span { font-size: 12px; font-weight: 600; color: var(--text2); }

    /* Modal overlay */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal {
      background: rgba(17,17,19,0.95); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-l); border-radius: 22px;
      width: 100%; max-width: 560px; max-height: 92vh;
      display: flex; flex-direction: column; overflow: hidden;
      box-shadow: var(--shadow-lg);
      animation: modalIn 0.22s var(--ease);
    }
    @keyframes modalIn { from { opacity:0; transform:translateY(10px) scale(0.98); } to { opacity:1; transform:none; } }

    /* Modal header */
    .modal-hdr {
      padding: 22px 24px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: flex-start; gap: 16px; flex-shrink: 0;
    }
    .modal-av {
      width: 68px; height: 68px; border-radius: 50%; flex-shrink: 0;
      background: var(--raised); border: 1px solid var(--border);
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: var(--text2);
    }
    .modal-av img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-info { flex: 1; min-width: 0; }
    .modal-name { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.04em; line-height: 1.1; }
    .modal-pos  { font-size: 13px; color: var(--text2); font-weight: 500; margin-top: 3px; }
    .modal-team { font-size: 12px; color: var(--text3); margin-top: 2px; }
    .modal-logo {
      width: 52px; height: 52px; border-radius: 50%; background: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3); flex-shrink: 0;
    }
    .modal-logo img { width: 36px; height: 36px; object-fit: contain; display: block; }
    .modal-close {
      background: var(--raised); border: 1px solid var(--border); border-radius: 9px;
      color: var(--text2); cursor: pointer; padding: 7px 11px; font-size: 15px;
      font-family: var(--ff); transition: all 0.15s var(--ease); flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text); border-color: var(--border-l); }

    /* Modal body */
    .modal-body { overflow-y: auto; padding: 20px 24px 24px; display: flex; flex-direction: column; gap: 14px; }

    /* Section */
    .sec { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
    .sec-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .sec-title span { font-size: 12px; color: var(--text2); font-weight: 600; letter-spacing: 0; text-transform: none; }

    /* Social rows -- icon+username left, number right */
    .social-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid var(--border);
    }
    .social-row:last-child { border-bottom: none; }
    .social-left { display: flex; align-items: center; gap: 8px; }
    .social-num { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -0.03em; line-height: 1; }
    .social-handle { font-size: 13px; color: var(--text2); text-decoration: none; font-weight: 500; }
    .social-handle:hover { color: var(--text); }

    /* Info rows */
    .ir { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .ir:last-child { border-bottom: none; }
    .ir-l { font-size: 12px; color: var(--text2); }
    .ir-v { font-size: 13px; color: var(--text); font-weight: 500; text-align: right; margin-left: 16px; }

    /* Bio */
    .bio { font-size: 13px; color: var(--text2); line-height: 1.65; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { background: var(--raised); border: 1px solid var(--border); border-radius: 8px; padding: 4px 11px; font-size: 12px; font-weight: 500; color: var(--text2); }

    /* Download button */
    .btn-dl {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      background: var(--green); border: none; border-radius: 11px;
      padding: 11px 20px; font-size: 13px; font-weight: 700; color: #0a0a0a;
      cursor: pointer; font-family: var(--ff); transition: all 0.18s var(--ease); width: 100%;
    }
    .btn-dl:hover { opacity: 0.88; }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; height: 60vh; }
    .dots { display: flex; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); animation: dot 1.2s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

    /* Error */
    .err { display: flex; align-items: center; justify-content: center; height: 80vh; text-align: center; flex-direction: column; gap: 8px; }
    .err h2 { font-size: 22px; font-weight: 700; }
    .err p  { font-size: 14px; color: var(--text2); }

    /* Print */
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      .header { position: static; backdrop-filter: none; }
      .btn-print, .btn-dl { display: none !important; }
      .modal-overlay { display: none !important; }
      html, body { background: var(--bg) !important; }
      .card { box-shadow: none !important; break-inside: avoid; }
    }

    /* Mobile */
    @media (max-width: 600px) {
      .header { padding: 0 16px; }
      .header-title { font-size: 12px; }
      .tabs { padding: 14px 16px 0; }
      .grid-wrap { padding: 14px 16px 40px; }
      .grid { grid-template-columns: 1fr 1fr; gap: 8px; }
      .modal { border-radius: 16px; }
      .modal-hdr { padding: 18px 18px 14px; }
      .modal-body { padding: 16px 18px 20px; }
    }
  </style>
</head>

  print: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><polyline points="6 9 6 2 18 2 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="6" y="14" width="12" height="8" rx="1" stroke="currentColor" stroke-width="2"/></svg>`,
  dl: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
};

let state = { data: null, level: 'All', selected: null, error: null };

const initials = n => (n||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
function avatarStyle(name) {
  const hash = (name||'').split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  const hue = (hash * 47) % 360;
  return `background:linear-gradient(135deg,hsl(${hue},55%,40%),hsl(${hue},55%,52%));border-color:hsl(${hue},55%,55%)`;
}
function onAvatarError(img, name) {
  const hash = (name||'').split('').reduce((a,c) => a + c.charCodeAt(0), 0);
  const hue = (hash * 47) % 360;
  const p = img.parentElement;
  p.style.background = `linear-gradient(135deg,hsl(${hue},55%,40%),hsl(${hue},55%,52%))`;
  p.style.borderColor = `hsl(${hue},55%,55%)`;
  img.style.display = 'none';
  const s = document.createElement('span');
  s.textContent = (name||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  s.style.cssText = 'font-weight:700;color:#fff;font-size:18px';
  p.appendChild(s);
}

function fmt(n) {
  if (!n && n !== 0) return null;
  const s = String(n).trim();
  if (/[KkMm]$/i.test(s)) return s.toUpperCase();
  const num = parseInt(s.replace(/[^0-9]/g,''));
  if (isNaN(num) || num === 0) return null;
  if (num >= 1000000) return (num/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
  if (num >= 1000)    return (num/1000).toFixed(1).replace(/\.0$/,'') + 'K';
  return String(num);
}

function parseNum(v) {
  if (!v) return 0;
  const s = String(v).trim().toUpperCase();
  if (s.endsWith('M')) return parseFloat(s) * 1000000;
  if (s.endsWith('K')) return parseFloat(s) * 1000;
  return parseInt(s.replace(/[^0-9]/g,'')) || 0;
}

function calcReach(a) {
  const t = parseNum(a.igFollowers) + parseNum(a.twitterFollowers) + parseNum(a.tiktokFollowers);
  return t > 0 ? t : null;
}

function render() {
  document.getElementById('root').innerHTML = buildHTML();
  attachListeners();
}

function buildHTML() {
  if (state.error) return `<div class="err"><h2>${state.error==='expired'?'Link expired':'Unavailable'}</h2><p>${state.error==='expired'?'Ask Milk & Honey Sports for a new link.':'Something went wrong.'}</p></div>`;
  if (!state.data) return `<div class="loading"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;

  const { title, athletes } = state.data;
  const levels = [...new Set((athletes||[]).map(a => a.level).filter(Boolean))];
  const filtered = state.level === 'All' ? athletes : athletes.filter(a => a.level === state.level);

  return `
    <div class="header">
      <div class="header-left">
        <img class="header-logo" src="${MH_LOGO}" alt="Milk &amp; Honey Sports" onerror="this.style.display='none'" />
        <div class="header-divider"></div>
        <div class="header-title">${title || 'Athlete Roster'} &nbsp;<span style="color:var(--text3);font-weight:400">${filtered.length} athletes</span></div>
      </div>
      <button class="btn-print" onclick="window.print()">${icons.print} Print PDF</button>
    </div>

    ${levels.length > 1 ? `<div class="tabs">
      ${['All',...levels].map(l => `<button class="tab${state.level===l?' active':''}" data-level="${l}">${l}</button>`).join('')}
    </div>` : ''}

    <div class="grid-wrap">
      ${filtered.length === 0
        ? `<div class="err" style="height:40vh"><p>No athletes in this view.</p></div>`
        : `<div class="grid">${filtered.map((a,i) => buildCard(a,i)).join('')}</div>`
      }
    </div>

    ${state.selected ? buildModal(state.selected) : ''}`;
}

function buildCard(a, i) {
  const team = a.nflTeam || (a.level !== 'NFL' ? a.college : '') || '';
  const socials = [
    {t:'ig', v:fmt(a.igFollowers)},
    {t:'tk', v:fmt(a.tiktokFollowers)},
    {t:'tw', v:fmt(a.twitterFollowers)},
  ].filter(s => s.v);

  return `
    <div class="card" data-idx="${i}">
      <div class="card-top">
        <div class="card-avatar" style="${a.photoUrl ? '' : avatarStyle(a.name)}">
          ${a.photoUrl
            ? `<img src="${a.photoUrl}" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="onAvatarError(this,'${(a.name||'').replace(/'/g,"\\'")}')"/>`
            : `<span style="font-weight:700;color:#fff;font-size:18px">${initials(a.name)}</span>`
          }
        </div>
        <div class="card-name">${a.name||''}</div>
        <div class="card-pos">${[a.position, a.jerseyNumber?'#'+a.jerseyNumber:''].filter(Boolean).join(' ')}</div>
        <div class="card-team">${team}</div>
      </div>
      ${(() => {
        const logoUrls = [a.proLogoUrl, a.pubLogoUrl, a.labelLogoUrl].filter(Boolean);
        if (!logoUrls.length && a.logoUrl) logoUrls.push(a.logoUrl);
        if (!logoUrls.length) return '';
        return `<div class="card-logos">${logoUrls.map(u =>
          `<div class="card-logo"><img src="${u}" onerror="this.parentElement.style.display='none'" referrerpolicy="no-referrer" /></div>`
        ).join('')}</div>`;
      })()}
      ${socials.length ? `<div class="card-social">${socials.map(s=>`<div class="cs">${icons[s.t]}<span>${s.v}</span></div>`).join('')}</div>` : ''}
    </div>`;
}

function buildModal(a) {
  const team = a.nflTeam || (a.level !== 'NFL' ? a.college : '') || '';
  const reach = calcReach(a);

  const socials = [
    {icon:'ig', num:fmt(a.igFollowers), handle:a.instagram, url:a.instagram?`https://instagram.com/${(a.instagram||'').replace('@','')}`:'', platform:'Instagram'},
    {icon:'tk', num:fmt(a.tiktokFollowers), handle:a.tiktok, url:a.tiktok?`https://tiktok.com/@${(a.tiktok||'').replace('@','')}`:'', platform:'TikTok'},
    {icon:'tw', num:fmt(a.twitterFollowers), handle:a.twitter, url:a.twitter?`https://x.com/${(a.twitter||'').replace('@','')}`:'', platform:'X / Twitter'},
  ].filter(s => s.num || s.handle);

  const info = [
    a.hometown ? {l:'Hometown',v:a.hometown} : null,
    a.college && a.level!=='High School' ? {l:'College',v:a.college} : null,
    a.yearInSchool ? {l:'Year',v:a.yearInSchool} : null,
    a.height ? {l:'Height',v:a.height} : null,
    a.weight ? {l:'Weight',v:a.weight+' lbs'} : null,
  ].filter(Boolean);

  // Build individual profile HTML for printing
  const profileHtml = `
    <!DOCTYPE html><html><head><meta charset="utf-8"/>
    <style>
      *{box-sizing:border-box;margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
      html,body{font-family:-apple-system,"Helvetica Neue",sans-serif;background:#080809;color:#f4f4f5}
      @page{margin:0;size:letter portrait}
      .hdr{background:#0a0a0a;padding:22px 56px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #5BC898}
      .hdr-logo{height:28px;filter:brightness(0) invert(1)}
      .hdr-date{font-size:10px;color:#555}
      .body{padding:40px 56px}
      .name{font-size:28px;font-weight:800;letter-spacing:-0.04em;margin-bottom:4px}
      .pos{font-size:14px;color:#71717a;margin-bottom:2px}
      .team{font-size:13px;color:#3f3f46;margin-bottom:24px}
      .stats{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}
      .stat{background:#111113;border:1px solid #1e1e22;border-radius:12px;padding:14px 18px;min-width:90px}
      .stat-num{font-size:22px;font-weight:800;letter-spacing:-0.03em}
      .stat-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#3f3f46;margin-top:4px}
      .bio{font-size:13px;color:#71717a;line-height:1.65;margin-bottom:20px}
      h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#3f3f46;margin-bottom:10px;margin-top:20px}
      .tags{display:flex;flex-wrap:wrap;gap:6px}
      .tag{background:#18181b;border:1px solid #1e1e22;border-radius:8px;padding:4px 11px;font-size:12px;color:#71717a}
    </style>
    </head><body>
    <div class="hdr">
      <img class="hdr-logo" src="${MH_LOGO}" alt="Milk & Honey Sports"/>
      <div class="hdr-date">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
    </div>
    <div class="body">
      <div class="name">${a.name||''}</div>
      <div class="pos">${[a.position,a.jerseyNumber?'#'+a.jerseyNumber:''].filter(Boolean).join(' ')}</div>
      <div class="team">${team}${a.yearInSchool?' · '+a.yearInSchool:''}</div>
      ${socials.length ? `<div class="stats">${reach?`<div class="stat"><div class="stat-num">${fmt(reach)}</div><div class="stat-lbl">Total Reach</div></div>`:''}${socials.map(s=>`<div class="stat"><div class="stat-num">${s.num||'—'}</div><div class="stat-lbl">${s.platform}</div></div>`).join('')}</div>` : ''}
      ${a.bio?`<div class="bio">${a.bio}</div>`:''}
      ${info.length?`<h3>Info</h3>${info.map(r=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1e1e22"><span style="color:#71717a;font-size:12px">${r.l}</span><span style="font-size:13px;font-weight:500">${r.v}</span></div>`).join('')}`:''}
      ${(a.interests||[]).length?`<h3>Interests</h3><div class="tags">${a.interests.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      ${(a.brands||[]).length?`<h3>Current Partners</h3><div class="tags">${a.brands.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
    </div>
    </body></html>`;

  const encodedHtml = encodeURIComponent(profileHtml);

  return `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-hdr">
          <div class="modal-av" style="${a.photoUrl ? '' : avatarStyle(a.name)}">
            ${a.photoUrl
              ? `<img src="${a.photoUrl}" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="onAvatarError(this,'${(a.name||'').replace(/'/g,"\\'")}')"/>`
              : `<span style="font-size:22px;font-weight:700;color:#fff">${initials(a.name)}</span>`
            }
          </div>
          <div class="modal-info">
            <div class="modal-name">${a.name||''}</div>
            <div class="modal-pos">${[a.position,a.jerseyNumber?'#'+a.jerseyNumber:''].filter(Boolean).join(' ')}</div>
            <div class="modal-team">${team}${a.yearInSchool?' · '+a.yearInSchool:''}</div>
          </div>
          ${a.logoUrl?`<div class="modal-logo"><img src="${a.logoUrl}" onerror="this.parentElement.style.display='none'" referrerpolicy="no-referrer"/></div>`:''}
          <button class="modal-close" id="modal-close">✕</button>
        </div>
        <div class="modal-body">

          ${socials.length ? `
          <div class="sec">
            <div class="sec-title">Social</div>
            ${socials.map(s => `
              <div class="social-row">
                <div class="social-left">
                  <span style="color:var(--text3)">${icons[s.icon]}</span>
                  ${s.url && s.handle
                    ? `<a class="social-handle" href="${s.url}" target="_blank" rel="noopener">@${(s.handle||'').replace('@','')}</a>`
                    : `<span class="social-handle" style="cursor:default">—</span>`
                  }
                </div>
                <div class="social-num">${s.num||'—'}</div>
              </div>`).join('')}
            ${reach ? `<div style="padding:10px 0 2px;font-size:12px;color:var(--text3);display:flex;justify-content:space-between"><span>Total Reach</span><span style="font-size:13px;font-weight:700;color:var(--text2)">${fmt(reach)}</span></div>` : ''}
          </div>` : ''}

          ${a.bio ? `<div class="sec"><div class="sec-title">Bio</div><div class="bio">${a.bio}</div></div>` : ''}

          ${info.length ? `<div class="sec"><div class="sec-title">Info</div>${info.map(r=>`<div class="ir"><span class="ir-l">${r.l}</span><span class="ir-v">${r.v}</span></div>`).join('')}</div>` : ''}

          ${(a.interests||[]).length ? `<div class="sec"><div class="sec-title">Interests</div><div class="tags">${a.interests.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>` : ''}
          ${(a.brands||[]).length ? `<div class="sec"><div class="sec-title">Current Partners</div><div class="tags">${a.brands.map(t=>`<span class="tag">${t}</span>`).join('')}</div></div>` : ''}

          <button class="btn-dl" onclick="printProfile()">
            ${icons.dl} Download Profile PDF
          </button>
        </div>
      </div>
    </div>

    <script>
    function printProfile() {
      const w = window.open('','_blank','width=900,height=700');
      w.document.write(decodeURIComponent('${encodedHtml}'));
      w.document.close();
      setTimeout(() => { w.focus(); w.print(); }, 500);
    }
    <\/script>`;
}

function attachListeners() {
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => { state.level = btn.dataset.level; render(); });
  });
  document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('click', () => {
      const idx = parseInt(card.dataset.idx);
      const filtered = state.level === 'All' ? state.data.athletes : state.data.athletes.filter(a => a.level === state.level);
      state.selected = filtered[idx];
      render();
    });
  });
  const overlay = document.getElementById('modal-overlay');
  const close   = document.getElementById('modal-close');
  if (close)   close.addEventListener('click', () => { state.selected = null; render(); });
  if (overlay) overlay.addEventListener('click', e => { if (e.target === overlay) { state.selected = null; render(); } });
  document.onkeydown = e => { if (e.key === 'Escape' && state.selected) { state.selected = null; render(); } };
}

async function load() {
  const id = location.pathname.split('/').pop();
  if (!id) { state.error = 'invalid'; render(); return; }
  try {
    const resp = await fetch(`/api/share?id=${id}`);
    if (!resp.ok) { state.error = 'notfound'; render(); return; }
    const data = await resp.json();
    if (data.type !== 'roster-share') { state.error = 'invalid'; render(); return; }
    if (data.expiresAt && new Date(data.expiresAt) < new Date()) { state.error = 'expired'; render(); return; }
    state.data = data;
    const levels = [...new Set((data.athletes||[]).map(a => a.level).filter(Boolean))];
    state.level = levels.length === 1 ? levels[0] : 'All';
    document.title = (data.title || 'Athlete Roster') + ' — Milk & Honey Sports';
    render();
  } catch(e) { state.error = 'error'; render(); }
}
load();
</script>
</body>
</html>
