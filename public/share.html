    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0a; transition: background .2s; font-family: -apple-system,'SF Pro Display','Helvetica Neue',sans-serif; min-height: 100vh; color: #f0f0f0; }

    /* Top bar */
    .topbar { background: #000; border-bottom: 1px solid #1c1c1c; padding: 0 40px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topbar-meta { color: #3a3a3a; font-size: 12px; }

    /* Spinner */
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; gap: 16px; color: #333; }
    .spinner { font-size: 36px; color: #5BC898; animation: spin 1s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    /* Full-width roster */
    .roster-outer { width: 100%; }

    /* Header */
    .roster-header { background: #111; padding: 30px 48px; display: flex; align-items: center; justify-content: space-between; position: relative; overflow: hidden; border-bottom: 2px solid #5BC898; }
    .roster-header::after { content:''; position:absolute; top:0; right:0; width:50%; height:100%; background: linear-gradient(to left, rgba(91,200,152,0.08), transparent); pointer-events:none; }
    .roster-title { color: #fff; font-size: 30px; font-weight: 800; letter-spacing: -0.025em; }
    .roster-subtitle { color: #5BC898; font-size: 14px; font-weight: 600; margin-top: 6px; letter-spacing: 0.04em; }
    .header-logo { position: relative; z-index: 1; }

    /* Athlete row */
    .athlete-row { display: grid; grid-template-columns: 48px 120px 1fr 260px 130px 88px; align-items: center; border-bottom: 1px solid #151515; background: #111; transition: background .12s; min-height: 130px; }
    .athlete-row:last-child { border-bottom: none; }
    .athlete-row:nth-child(even) { background: #0e0e0e; }
    .athlete-row:hover { background: #1c1c1c; }

    .photo-col { width: 120px; height: 130px; overflow: hidden; flex-shrink: 0; }
    .photo-col img { width: 100%; height: 100%; object-fit: cover; object-position: top center; display: block; }
    .photo-initials { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 700; color: #5BC898; background: rgba(91,200,152,0.06); }

    .info-col { padding: 16px 28px 16px 20px; min-width: 0; }
    .athlete-name { font-weight: 800; font-size: 24px; color: #ffffff; letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .athlete-sub { font-size: 14px; color: #5BC898; font-weight: 600; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .socials-col { display: flex; align-items: center; gap: 20px; padding: 0 20px; flex-wrap: wrap; }
    .social-link { display: flex; align-items: center; gap: 7px; text-decoration: none; transition: opacity .15s; }
    .social-link:hover { opacity: 0.65; }
    .social-val { font-size: 15px; font-weight: 700; }
    .tk-wrap { display: flex; align-items: center; gap: 7px; background: rgba(255,255,255,0.07); border-radius: 8px; padding: 5px 10px 5px 8px; }

    .reach-col { text-align: right; padding-right: 24px; }
    .reach-label { font-size: 9px; color: #3a3a3a; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 3px; }
    .reach-val { font-size: 26px; font-weight: 800; color: #5BC898; letter-spacing: -0.02em; line-height: 1; }

    .logo-col { display: flex; align-items: center; justify-content: center; }
    .logo-wrap { width: 62px; height: 62px; border-radius: 50%; background: #fff; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-wrap img { width: 40px; height: 40px; object-fit: contain; }

    .roster-footer { background: #000; padding: 16px 48px; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid #1a1a1a; }
    .footer-brand { color: #5BC898; font-size: 10px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; }
    .footer-year { color: #2a2a2a; font-size: 10px; }

    @media (max-width: 900px) {
      .topbar { padding: 0 16px; }
      .roster-header { flex-direction: row; align-items: center; padding: 16px 20px; }
      .roster-header img { height: 26px !important; flex-shrink: 0; }
      .roster-title { font-size: 15px; }
      .col-headers { display: none; }
      .athlete-row { grid-template-columns: 62px 1fr auto 46px; min-height: 80px; }
      .athlete-row > div:nth-child(1) { display: none; }
      .photo-col { width: 62px; height: 80px; }
      .info-col { padding: 8px 8px; }
      .athlete-name { font-size: 14px; }
      .athlete-sub { font-size: 10px; }
      .socials-col { flex-direction: column; gap: 3px; padding: 8px 4px 8px 0; align-items: flex-end; justify-content: center; }
      .social-val { font-size: 11px; }
      .reach-col { display: none; }
      .logo-col { display: flex; align-items: center; justify-content: center; padding-right: 6px; }
      .logo-wrap { width: 36px; height: 36px; }
      .logo-wrap img { width: 26px; height: 26px; }
      .roster-footer { padding: 10px 16px; }
    }
    @media (max-width: 480px) {
      .roster-header img { height: 22px !important; }
      .roster-title { font-size: 13px; }
      .athlete-row { grid-template-columns: 54px 1fr auto 40px; min-height: 70px; }
      .photo-col { width: 54px; height: 70px; }
      .athlete-name { font-size: 13px; }
      .social-val { font-size: 10px; }
      .logo-wrap { width: 28px; height: 28px; }
      .logo-wrap img { width: 20px; height: 20px; }
    }
  </style>

function normalizeSchoolKey(value) {
  return String(value || "")
    .toLowerCase()
    .trim()
    .replace(/&/g, "and")
    .replace(/\./g, "")
    .replace(/[’']/g, "")
    .replace(/-/g, " ")
    .replace(/\((.*?)\)/g, "$1")
    .replace(/\b(university|college|the)\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function getCollegeLogoId(college) {
  const raw = String(college || "").toLowerCase().trim();
  const normalized = normalizeSchoolKey(college);

  if (COLLEGE_LOGOS[raw]) return COLLEGE_LOGOS[raw];
  if (COLLEGE_LOGOS[normalized]) return COLLEGE_LOGOS[normalized];

  const key = Object.keys(COLLEGE_LOGOS).find(k => {
    const nk = normalizeSchoolKey(k);
    return normalized === nk || normalized.includes(nk) || nk.includes(normalized);
  });

  return key ? COLLEGE_LOGOS[key] : null;
}

function getLogoUrl(a) {
  const team = (a.nflTeam || '').toLowerCase().trim();
  const college = (a.college || '').toLowerCase().trim();
  const level = (a.level || '').toLowerCase().trim();

  if (team && NFL_LOGOS[team]) {
    return `https://a.espncdn.com/i/teamlogos/nfl/500/${NFL_LOGOS[team]}.png`;
  }

  if (level === 'nfl') return null;

  if (level === 'high school' && a.committedTo) {
    const id = getCollegeLogoId(a.committedTo);
    return id ? `https://a.espncdn.com/i/teamlogos/ncaa/500/${id}.png` : null;
  }

  if (college) {
    const collegeLogoId = getCollegeLogoId(college);
    if (collegeLogoId) {
      return `https://a.espncdn.com/i/teamlogos/ncaa/500/${collegeLogoId}.png`;
    }
  }

  return null;
}
function photoUrl(a) {
  if (a.photoUrl) return a.photoUrl;
  if (!a.espnId) return null;
  const sport = (a.espnSport||'nfl') === 'college' ? 'college-football' : 'nfl';
  return `https://a.espncdn.com/i/headshots/${sport}/players/full/${a.espnId}.png`;
}
function totalReach(a) {
  const p = s => { if (!s||s==='—') return 0; const n=parseFloat(s); return s.includes('M')?n*1e6:s.includes('K')?n*1e3:n; };
  const t = p(a.igFollowers)+p(a.twitterFollowers)+p(a.tiktokFollowers);
  if (t>=1e6) return (t/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if (t>=1e3) return Math.round(t/1e3)+'K';
  return t?t.toString():'—';
}
function initials(name) { return (name||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase(); }
function getDisplayTeam(a) { return a.nflTeam || a.college || ''; }
function toArr(v) { if (Array.isArray(v)) return v; if (!v) return []; return String(v).split(',').map(s=>s.trim()).filter(Boolean); }
function normalizeBodyFontSize(value) {
  const n = Number(value);
  if (!Number.isFinite(n)) return 12;
  return Math.min(24, Math.max(8, Math.round(n)));
}

function renderRoster(data) {
  const { title, athletes, settings, createdAt } = data;
  const { showSocials=true, showReach=true } = settings||{};
  document.title = title || 'Milk & Honey Sports';
  const meta = document.getElementById('topbar-meta');
  if (meta && createdAt) {
    const d = new Date(createdAt);
    meta.textContent = `Shared ${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}`;
  }

  const app = document.getElementById('app');
  app.innerHTML = '';
  const outer = document.createElement('div');
  outer.className = 'roster-outer';

  outer.innerHTML = `
    <div class="roster-header">
      <div>
        <div class="roster-title">${title||'Milk & Honey Sports'}</div>
        <div class="roster-subtitle">${athletes.length} Athlete${athletes.length!==1?'s':''}</div>
      </div>
      <div class="header-logo" style="position:relative;z-index:1">
        <img src="https://www.milkhoneyla.com/wp-content/uploads/2024/05/cropped-MH-Logo.png" alt="Milk &amp; Honey Sports" style="height:48px;object-fit:contain;display:block;" />
      </div>
    </div>
  `;

  const rowsWrap = document.createElement('div');
  athletes.forEach((a) => {
    const logo = getLogoUrl(a);
    const photo = photoUrl(a);
    const reach = totalReach(a);
    let sub = [a.position, a.jerseyNumber&&`#${a.jerseyNumber}`, getDisplayTeam(a)].filter(Boolean).join(' · ');
    if (a.level==='High School') sub = [a.position, a.college||getDisplayTeam(a), a.classOf?`Class of ${a.classOf}`:''].filter(Boolean).join(' · ');

    const socialParts = [];
    if (showSocials) {
      if (a.igFollowers && a.instagram)
        socialParts.push(`<a class="social-link" href="https://instagram.com/${a.instagram}" target="_blank" rel="noopener">${IG_SVG}<span class="social-val" style="color:#e1306c">${a.igFollowers}</span></a>`);
      if (a.twitterFollowers && a.twitter)
        socialParts.push(`<a class="social-link" href="https://x.com/${a.twitter.replace(/^@/,'')}" target="_blank" rel="noopener">${TW_SVG}<span class="social-val" style="color:#1da1f2">${a.twitterFollowers}</span></a>`);
      if (a.tiktokFollowers && a.tiktok)
        socialParts.push(`<a class="social-link tk-wrap" href="https://tiktok.com/@${a.tiktok}" target="_blank" rel="noopener">${TK_SVG}<span class="social-val" style="color:#fff">${a.tiktokFollowers}</span></a>`);
    }

    const row = document.createElement('div');
    row.className = 'athlete-row';
    row.innerHTML = `
      <div></div>
      <div class="photo-col">
        ${photo ? `<img src="${photo}" alt="${a.name}" onerror="this.outerHTML='<div class=photo-initials>${initials(a.name)}</div>'" />` : `<div class="photo-initials">${initials(a.name)}</div>`}
      </div>
      <div class="info-col">
        <div class="athlete-name">${a.name}</div>
        <div class="athlete-sub">${sub}</div>
      </div>
      <div class="socials-col">${socialParts.join('')}</div>
      <div class="reach-col">
        ${showReach && reach!=='—' ? `<div class="reach-label">Total Reach</div><div class="reach-val">${reach}</div>` : ''}
      </div>
      <div class="logo-col">
        ${logo ? `<div class="logo-wrap"><img src="${logo}" alt="" onerror="this.parentElement.style.display='none'" /></div>` : ''}
      </div>
    `;
    rowsWrap.appendChild(row);
  });
  outer.appendChild(rowsWrap);

  const footer = document.createElement('div');
  footer.className = 'roster-footer';
  footer.innerHTML = `<span class="footer-brand">Milk & Honey Sports</span><span class="footer-year">${new Date().getFullYear()}</span>`;
  outer.appendChild(footer);
  app.appendChild(outer);
}

    `;
  }

  // Specific brand pitch
  if (hasBrand) {
    body.innerHTML += `
      <div style="background:${T.pitchBg};border:1.5px solid ${T.pitchBorder};border-radius:10px;padding:14px 18px;margin-bottom:16px;">
        <div style="font-size:${sectionHeaderFontPx}px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:${T.pitchTitle};margin-bottom:7px;">Why ${a.name.split(' ')[0]} & ${brandName}</div>
        ${safeKeywords.length ? `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">${safeKeywords.map(k=>`<span style="background:rgba(91,200,152,0.15);color:${T.pitchTitle};border:1px solid rgba(91,200,152,0.3);border-radius:20px;padding:2px 9px;font-size:9px;font-weight:700;">${k}</span>`).join('')}</div>` : ''}
        <p style="font-size:${bodyFontPx}px;line-height:1.7;color:${T.pitchBody};margin:0;">${pitch}</p>
        ${safeIdeas.length ? `
          <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(91,200,152,0.2);">
            <div style="font-size:${sectionHeaderFontPx}px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:${T.pitchTitle};margin-bottom:6px;">Marketing Ideas</div>
            ${safeIdeas.map(i=>`<div style="display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;"><span style="color:#5BC898;font-weight:700;font-size:10px;flex-shrink:0;">→</span><span style="font-size:${smallBodyFontPx}px;line-height:1.55;color:${T.pitchBody};">${typeof i === 'object' ? i.text : i}</span></div>`).join('')}
          </div>` : ''}
      </div>
      <div style="height:1px;background:linear-gradient(to right,#5BC898,transparent);margin-bottom:16px;"></div>
    `;
  }

  // Generic outreach section (dark card)
  if (hasOutreach) {
    const title = outreachTitle || `Why Brands Want to Work With ${a.name.split(' ')[0]}`;
    body.innerHTML += `
      <div style="background:#0a0a0a;border:1.5px solid #1e1e1e;border-radius:10px;padding:14px 18px;margin-bottom:16px;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;right:0;width:40%;height:100%;background:linear-gradient(to left,rgba(91,200,152,0.08),transparent);pointer-events:none;"></div>
        <div style="font-size:${sectionHeaderFontPx}px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#5BC898;margin-bottom:12px;">${title}</div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          ${safeOutreachCards.map((card, i) => `
            <div style="${i < safeOutreachCards.length - 1 ? 'padding-bottom:10px;border-bottom:1px solid rgba(91,200,152,0.15);' : ''}">
              <div style="font-size:${sectionHeaderFontPx}px;font-weight:800;color:#5BC898;letter-spacing:-0.01em;margin-bottom:3px;">${card.keyword}</div>
              <p style="font-size:${smallBodyFontPx}px;line-height:1.65;color:#ccc;margin:0;">${card.description}</p>
            </div>`).join('')}
        </div>
      </div>
      <div style="height:1px;background:linear-gradient(to right,#5BC898,transparent);margin-bottom:16px;"></div>
    `;
  }

  // Music + Interests + Brands grid
  const musicArtists = toArr(a.musicArtists);
  const interests    = toArr(a.interests);
  const brands       = toArr(a.brands);

  const showGrid = (showMusic && musicArtists.length) || (showInterests && interests.length) || (showBrands);
  if (showGrid) {
    const cols = [];
    if (showMusic && musicArtists.length) {
      cols.push(`
        <div>
          <div style="font-size:${sectionHeaderFontPx}px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#5BC898;margin-bottom:7px;">Music Artists</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${musicArtists.map(m=>`<span style="background:${T.tagBg};color:${T.tagText};border:1px solid ${T.tagBorder};border-radius:20px;padding:4px 12px;font-size:${smallBodyFontPx}px;font-weight:600;">${m}</span>`).join('')}</div>
        </div>`);
    }
    if (showInterests) {
      cols.push(`
        <div>
          <div style="font-size:${sectionHeaderFontPx}px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#5BC898;margin-bottom:7px;">Interests</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${interests.length ? interests.map(i=>`<span style="background:${T.tagBg};color:${T.tagText};border:1px solid ${T.tagBorder};border-radius:20px;padding:4px 12px;font-size:${smallBodyFontPx}px;font-weight:600;">${i}</span>`).join('') : `<span style="color:${T.textMeta};font-size:${bodyFontPx}px;">—</span>`}</div>
        </div>`);
    }
    if (showBrands) {
      cols.push(`
        <div>
          <div style="font-size:${sectionHeaderFontPx}px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;color:#5BC898;margin-bottom:7px;">Brand Partners</div>
          <div style="display:flex;flex-wrap:wrap;gap:5px;">${brands.length ? brands.map(b=>`<span style="background:${T.tagBg};color:${T.tagText};border:1px solid ${T.tagBorder};border-radius:20px;padding:4px 12px;font-size:${smallBodyFontPx}px;font-weight:600;">${b}</span>`).join('') : `<span style="color:${T.textMeta};font-size:${bodyFontPx}px;">No current partners</span>`}</div>
        </div>`);
    }
    if (cols.length) {
      body.innerHTML += `<div style="display:grid;grid-template-columns:${cols.length === 1 ? '1fr' : '1fr 1fr'};gap:20px;margin-bottom:16px;">${cols.join('')}</div>`;
    }
  }

  // Action photo — respects crop settings
  if (secondaryPhoto) {
    const px = photoX ?? 50, py = photoY ?? 50, pz = photoZoom ?? 100;
    body.innerHTML += `
      <div style="border-radius:10px;overflow:hidden;margin-top:8px;">
        <img src="${secondaryPhoto}"
          style="width:100%;max-height:340px;object-fit:cover;display:block;
            object-position:${px}% ${py}%;
            transform:scale(${pz/100});
            transform-origin:${px}% ${py}%;" />
      </div>`;
  }

  // Brand logo
  if (brandLogo) {
    body.innerHTML += `<div style="margin-top:14px;display:flex;align-items:center;gap:10px;"><div style="font-size:9px;color:${T.textMeta};text-transform:uppercase;letter-spacing:0.1em;font-weight:700;">Brand</div><img src="${brandLogo}" style="height:32px;object-fit:contain;" /></div>`;
  }

  page.appendChild(body);

  // Footer
  const footer = document.createElement('div');
  footer.style.cssText = 'background:#0a0a0a;padding:12px 36px;display:flex;justify-content:space-between;align-items:center;';
  footer.innerHTML = `<span style="color:#5BC898;font-size:9px;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;">Milk & Honey Sports</span><span style="color:#333;font-size:9px;">${new Date().getFullYear()}</span>`;
  page.appendChild(footer);

  wrap.appendChild(page);
  app.appendChild(wrap);
}

function espnPhotoHtml(a) {
  const url = a.photoUrl || (a.espnId ? `https://a.espncdn.com/i/headshots/${(a.espnSport||'nfl')==='college'?'college-football':'nfl'}/players/full/${a.espnId}.png` : null);
  const fallback = `<div style="width:110px;height:140px;border-radius:10px;background:rgba(91,200,152,0.1);border:2px solid rgba(91,200,152,0.3);display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;color:#5BC898;flex-shrink:0;">${initials(a.name)}</div>`;
  if (!url) return fallback;
  return `<img src="${url}" style="width:110px;height:140px;border-radius:10px;object-fit:cover;object-position:top center;border:2px solid rgba(91,200,152,0.35);flex-shrink:0;" onerror="this.outerHTML='${fallback.replace(/'/g,'"')}'" />`;
}

function setTheme(t) {
  currentTheme = THEMES[t] ? t : 'dark';
  const T = THEMES[currentTheme];
  document.body.style.background = T.pageBg;
  const topbar = document.querySelector('.topbar');
  if (topbar) { topbar.style.background = T.topbarBg; topbar.style.borderBottomColor = T.topbarBorder; }
  const outer = document.querySelector('.roster-outer');
  if (outer) applyThemeToRoster(T);
}

function applyThemeToRoster(T) {
  const outer = document.querySelector('.roster-outer');
  if (!outer) return;
  const hdr = outer.querySelector('.roster-header');
  if (hdr) { hdr.style.background = T.headerBg; hdr.style.borderBottomColor = T.headerBorder; }
  outer.querySelectorAll('.athlete-row').forEach((row, i) => {
    row.style.background = i % 2 === 0 ? T.rowOdd : T.rowEven;
    row.style.borderBottomColor = T.border;
    const name = row.querySelector('.athlete-name');
    if (name) name.style.color = T.text;
    const sub = row.querySelector('.athlete-sub');
    if (sub) sub.style.color = T.textSub;
  });
  outer.querySelectorAll('.logo-wrap').forEach(w => w.style.background = T.logoCircle);
  outer.querySelectorAll('.tk-wrap').forEach(w => w.style.background = T.socialTkBg);
  const footer = outer.querySelector('.roster-footer');
  if (footer) footer.style.background = T.footerBg;
  const footerBrand = footer?.querySelector('.footer-brand');
  if (footerBrand) footerBrand.style.color = T.footerText;
  outer.style.background = T.pageBg;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
const _params = new URLSearchParams(window.location.search);
const _parts = window.location.pathname.split('/').filter(Boolean);
const shareId = _params.get('id') || _parts[_parts.indexOf('share') + 1] || _parts[_parts.length - 1] || '';

if (!shareId) {
  document.getElementById('app').innerHTML = '<div style="text-align:center;padding:100px 20px;color:#333"><h2 style="color:#555;margin-bottom:8px">Invalid link</h2></div>';
} else {
  fetch(`/api/share?id=${shareId}`)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      currentTheme = data.theme || data.settings?.theme || 'dark';
      if (data.type === 'individual') {
        renderOnePager(data);
      } else {
        renderRoster(data);
      }
      setTimeout(() => setTheme(currentTheme), 50);
    })
    .catch((err) => {
      console.error('Share page error:', err);
      document.getElementById('app').innerHTML = `<div style="text-align:center;padding:100px 20px;color:#333"><h2 style="color:#555;margin-bottom:8px">Share page error</h2><p style="color:#2a2a2a">${err.message || 'This link may have expired.'}</p></div>`;
    });
}
</script>
</body>
</html>
